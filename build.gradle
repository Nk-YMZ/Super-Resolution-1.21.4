import superresolution.VersionConfig
import superresolution.ModrinthUploader

plugins {
    id "dev.architectury.loom" version "1.10-SNAPSHOT" apply false
    id "architectury-plugin" version "3.4-SNAPSHOT"
    id "systems.manifold.manifold-gradle-plugin" version "0.0.2-alpha"
    id "com.github.johnrengelman.shadow" version "8.1.1" apply false
    id "io.github.pacifistmc.forgix" version "1.2.9"
}

ext {
    enableVulkan = sr_enable_vulkan == "true"
    versionConfig = VersionConfig.loadFromFile(new File("$rootDir/versionConfigs/${minecraft_version}.json"))
}


static int toVerCode(String verStr) {
    int a = Integer.parseInt(verStr.split("\\.")[0])
    int b = Integer.parseInt(verStr.split("\\.")[1])
    int c = Integer.parseInt(verStr.split("\\.")[2])
    return (a * 10000000) + (b * 1000) + (c * 1)
}

def writeDefine() {
    StringBuilder sb = new StringBuilder()
    new File(rootProject.projectDir, "versionConfigs").eachFile { file ->
        if (file.name.endsWith(".json")) {
            def ver = file.name.replace(".json", "")
            def verCode = toVerCode(ver)
            sb.append("MC_" + ver.replace(".", "_") + "=" + toVerCode(ver) + "\n")
            println("%s -> %s".formatted(ver, verCode))
        }
    }
    sb.append("MC_VER=" + toVerCode(versionConfig.common.minecraftVersion) + "\n")
    sb.append("ENABLE_VULKAN=%s\n".formatted(rootProject.enableVulkan ? "1" : "0"))
    if (rootProject.enableVulkan) println("enableVulkan")
    println("MC_VER=%s -> %s".formatted(versionConfig.common.minecraftVersion, toVerCode(versionConfig.common.minecraftVersion)))
    new File(projectDir.asWritable().absolutePath, "build.properties").text = sb.toString()
}

writeDefine()

architectury {
    minecraft = versionConfig.common.minecraftVersion
}


allprojects {
    apply plugin: "systems.manifold.manifold-gradle-plugin"
    group = rootProject.maven_group
    version = rootProject.mod_version
    tasks.withType(JavaCompile) {
        options.release = versionConfig.common.javaVersion as Integer
        options.compilerArgs += ["-Xplugin:Manifold"]
        options.encoding = "UTF-8"
    }
}

subprojects {
    apply plugin: "dev.architectury.loom"
    apply plugin: "architectury-plugin"
    apply plugin: "systems.manifold.manifold-gradle-plugin"
    apply plugin: "maven-publish"

    manifold {
        manifoldVersion = rootProject.manifold_version
    }

    base {
        archivesName = "$rootProject.archives_name-$project.name-$versionConfig.common.minecraftVersion"
    }

    repositories {

        maven {
            name 'ParchmentMC'
            url 'https://maven.parchmentmc.org/'
        }
        maven {
            url "https://maven.neoforged.net/releases"
        }

    }

    dependencies {
        minecraft "net.minecraft:minecraft:$versionConfig.common.minecraftVersion"
        mappings loom.layered() {
            officialMojangMappings()
            if (versionConfig.common.parchmentVersion != null) {
                parchment("org.parchmentmc.data:parchment-${versionConfig.common.parchmentVersion}@zip")
            }
        }
        annotationProcessor("systems.manifold:manifold-preprocessor:${rootProject.manifold_version}")
        configurations.configureEach {
            resolutionStrategy {
                force "org.lwjgl:lwjgl:$versionConfig.common.lwjglVersion"
                force "org.lwjgl:lwjgl-glfw:$versionConfig.common.lwjglVersion"
                force "org.lwjgl:lwjgl-opengl:$versionConfig.common.lwjglVersion"
                force "org.lwjgl:lwjgl-openal:$versionConfig.common.lwjglVersion"
                force "org.lwjgl:lwjgl-stb:$versionConfig.common.lwjglVersion"
                force "org.lwjgl:lwjgl-jemalloc:$versionConfig.common.lwjglVersion"
                force "org.lwjgl:lwjgl-tinyfd:$versionConfig.common.lwjglVersion"
                if (enableVulkan) {
                    force "org.lwjgl:lwjgl-vulkan:$versionConfig.common.lwjglVersion"

                }
                force "org.lwjgl:lwjgl-freetype:$versionConfig.common.lwjglVersion"
            }
        }
        if (enableVulkan) {
            implementation("org.lwjgl:lwjgl-vulkan:$versionConfig.common.lwjglVersion")
        }
        implementation "org.lwjgl:lwjgl-glfw:$versionConfig.common.lwjglVersion"
    }


    java {
        withSourcesJar()

        sourceCompatibility = JavaVersion.toVersion(versionConfig.common.javaVersion)
        targetCompatibility = JavaVersion.toVersion(versionConfig.common.javaVersion)
    }

    tasks.withType(JavaCompile).configureEach {
        it.options.release = versionConfig.common.javaVersion
    }

    publishing {
        publications {
            mavenJava(MavenPublication) {
                artifactId = base.archivesName.get()
                from components.java
            }
        }

        repositories {

        }
    }
}
forgix {
    group = "io.homo.superresolution"
    mergedJarName = "superresolution-${rootProject.mod_version}-${versionConfig.common.minecraftVersion}.jar"
    outputDir = "build/"
}
tasks.register("uploadToModrinth") {
    doLast {
        def changelogFile = new File("CHANGELOG.md")
        if (!changelogFile.exists()) {
            throw new GradleException("CHANGELOG.md not found!")
        }

        def (currentVersion, latestChangelog) = parseChangelog(changelogFile)

        println "\n=== 最新版本更新日志 (${currentVersion}) ===\n"
        latestChangelog.each { println it }
        println "\n========================"

        def confirm = getConsoleInput("是否使用此更新日志？(Y/N): ").trim().toLowerCase()

        if (!confirm.startsWith("y")) {
            println "上传已取消"
            return
        }

        ModrinthUploader.init()
        def jarsDir = file("${projectDir}/build_jars")
        println("将要上传的文件：")
        jarsDir.eachFile { file ->
            println(file.absolutePath)
        }

        confirm = getConsoleInput("是否继续？(Y/N): ").trim().toLowerCase()
        if (!confirm.startsWith("y")) {
            println "上传已取消"
            return
        }
        jarsDir.eachFile { file ->
            def notSucceed = true
            while (notSucceed) {
                try {
                    ModrinthUploader.uploadFile(file, latestChangelog.join("\n"))
                    notSucceed = false
                } catch (Exception e) {
                    e.printStackTrace()
                    println "上传失败，重试"
                }
            }
        }

    }
}


static def parseChangelog(File file) {
    def versionPattern = ~/^#\s+(\d+\.\d+\.\d+(-[a-zA-Z]+(\.[\d]+)?)*)\s*$/
    def currentVersion = null
    def changelog = []
    def versionEnded = false
    def previousEmpty = false

    file.eachLine { line ->
        if (versionEnded) return

        def matcher = (line =~ versionPattern)
        if (matcher.matches()) {
            if (currentVersion == null) {
                currentVersion = matcher.group(1)
                changelog << line
            } else {
                versionEnded = true
                return
            }
        } else if (currentVersion != null) {
            if (line.trim().isEmpty()) {
                if (previousEmpty) {
                    versionEnded = true
                    return
                }
                previousEmpty = true
            } else {
                previousEmpty = false
            }
            changelog << line
        }
    }

    while (changelog.last().trim().isEmpty()) {
        changelog.removeLast()
    }

    return [currentVersion, changelog]
}

def getConsoleInput(String prompt) {
    try {
        print prompt
        def br = new BufferedReader(new InputStreamReader(System.in))
        println ""
        return br.readLine()
    } catch (IOException e) {
        throw new GradleException("无法读取用户输入", e)
    }
}