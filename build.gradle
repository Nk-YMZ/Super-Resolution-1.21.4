plugins {
    id "dev.architectury.loom" version "1.7-SNAPSHOT" apply false
    id "architectury-plugin" version "3.4-SNAPSHOT"
    id "com.github.johnrengelman.shadow" version "8.1.1" apply false
    id "io.github.pacifistmc.forgix" version "1.2.9"
}
project.ext.lwjglVersion = "3.3.3"


architectury {
    minecraft = project.minecraft_version
}


allprojects {
    group = rootProject.maven_group
    version = rootProject.mod_version
}

subprojects {
    apply plugin: "dev.architectury.loom"
    apply plugin: "architectury-plugin"
    apply plugin: "maven-publish"

    base {
        archivesName = "$rootProject.archives_name-$project.name"
    }

    repositories {

        maven {
            name 'ParchmentMC'
            url 'https://maven.parchmentmc.org/'
        }
        maven {
            url "https://maven.neoforged.net/releases"
        }

    }

    dependencies {
        minecraft "net.minecraft:minecraft:$rootProject.minecraft_version"
        mappings loom.layered() {
            officialMojangMappings()
            parchment("org.parchmentmc.data:parchment-${rootProject.parchmentmc_minecraft_version}:2024.11.17@zip")
        }
        configurations.configureEach {
            resolutionStrategy {
                force "org.lwjgl:lwjgl:$lwjglVersion"
                force "org.lwjgl:lwjgl-glfw:$lwjglVersion"
                force "org.lwjgl:lwjgl-opengl:$lwjglVersion"
                force "org.lwjgl:lwjgl-openal:$lwjglVersion"
                force "org.lwjgl:lwjgl-stb:$lwjglVersion"
                force "org.lwjgl:lwjgl-jemalloc:$lwjglVersion"
                force "org.lwjgl:lwjgl-tinyfd:$lwjglVersion"
                force "org.lwjgl:lwjgl-vulkan:$lwjglVersion"
                force "org.lwjgl:lwjgl-freetype:$lwjglVersion"
                force "org.lwjgl:lwjgl-shaderc:$lwjglVersion"
            }
        }
        implementation("org.lwjgl:lwjgl-vulkan:$lwjglVersion")
        implementation("org.lwjgl:lwjgl-shaderc")
        implementation("org.lwjgl:lwjgl-shaderc::natives-windows")
        implementation "org.lwjgl:lwjgl-glfw:$lwjglVersion"
    }


    java {
        withSourcesJar()

        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    tasks.withType(JavaCompile).configureEach {
        it.options.release = 21
    }

    publishing {
        publications {
            mavenJava(MavenPublication) {
                artifactId = base.archivesName.get()
                from components.java
            }
        }

        repositories {

        }
    }
}

forgix {
    group = "io.homo.superresolution"
    mergedJarName = "superresolution-${rootProject.mod_version}-${rootProject.minecraft_version}.jar"
    outputDir = "build/"
}