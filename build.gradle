plugins {
    id "dev.architectury.loom" version "1.7-SNAPSHOT" apply false
    id "architectury-plugin" version "3.4-SNAPSHOT"
    id "systems.manifold.manifold-gradle-plugin" version "0.0.2-alpha"
    id "com.github.johnrengelman.shadow" version "8.1.1" apply false
    id "io.github.pacifistmc.forgix" version "1.2.9"
}

static int toVerCode(String verStr) {
    int a = Integer.parseInt(verStr.split("\\.")[0])
    int b = Integer.parseInt(verStr.split("\\.")[1])
    int c = Integer.parseInt(verStr.split("\\.")[2])
    return (a * 10000000) + (b * 1000) + (c * 1)
}

def writeDefine() {
    StringBuilder sb = new StringBuilder();
    new File(rootProject.projectDir, "versionConfigs").eachFile { file ->
        def ver = file.name.replace(".properties", "")
        def verCode = toVerCode(ver)
        sb.append("MC_" + ver.replace(".", "_") + "=" + toVerCode(ver) + "\n")
        println("%s -> %s".formatted(ver, verCode))
    }
    sb.append("MC_VER=" + toVerCode(rootProject.minecraft_version) + "\n")
    new File(projectDir.asWritable().absolutePath, "build.properties").text = sb.toString()
}

project.gradle.ext.getProperties().each { prop ->
    rootProject.ext.set(prop.key, prop.value)
    println "[key:" + prop.key + ", value:" + prop.value + "]"
}
writeDefine()

architectury {
    minecraft = project.minecraft_version
}


allprojects {
    apply plugin: "systems.manifold.manifold-gradle-plugin"
    group = rootProject.maven_group
    version = rootProject.mod_version
    tasks.withType(JavaCompile) {
        options.release = rootProject.java_version as Integer
        options.compilerArgs += ["-Xplugin:Manifold"]
        options.encoding = "UTF-8"
    }
}

subprojects {
    apply plugin: "dev.architectury.loom"
    apply plugin: "architectury-plugin"
    apply plugin: "systems.manifold.manifold-gradle-plugin"
    apply plugin: "maven-publish"

    manifold {
        manifoldVersion = rootProject.manifold_version
    }

    base {
        archivesName = "$rootProject.archives_name-$project.name-$rootProject.minecraft_version"
    }

    repositories {

        maven {
            name 'ParchmentMC'
            url 'https://maven.parchmentmc.org/'
        }
        maven {
            url "https://maven.neoforged.net/releases"
        }

    }

    dependencies {
        minecraft "net.minecraft:minecraft:$rootProject.minecraft_version"
        mappings loom.layered() {
            officialMojangMappings()
            parchment("org.parchmentmc.data:parchment-${rootProject.parchment_version}@zip")
        }
        annotationProcessor("systems.manifold:manifold-preprocessor:${rootProject.manifold_version}")
        configurations.configureEach {
            resolutionStrategy {
                force "org.lwjgl:lwjgl:$rootProject.lwjgl_version"
                force "org.lwjgl:lwjgl-glfw:$rootProject.lwjgl_version"
                force "org.lwjgl:lwjgl-opengl:$rootProject.lwjgl_version"
                force "org.lwjgl:lwjgl-openal:$rootProject.lwjgl_version"
                force "org.lwjgl:lwjgl-stb:$rootProject.lwjgl_version"
                force "org.lwjgl:lwjgl-jemalloc:$rootProject.lwjgl_version"
                force "org.lwjgl:lwjgl-tinyfd:$rootProject.lwjgl_version"
                force "org.lwjgl:lwjgl-vulkan:$rootProject.lwjgl_version"
                force "org.lwjgl:lwjgl-freetype:$rootProject.lwjgl_version"
            }
        }
        implementation("org.lwjgl:lwjgl-vulkan:$rootProject.lwjgl_version")
        implementation "org.lwjgl:lwjgl-glfw:$rootProject.lwjgl_version"
    }


    java {
        withSourcesJar()

        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    tasks.withType(JavaCompile).configureEach {
        it.options.release = 21
    }

    publishing {
        publications {
            mavenJava(MavenPublication) {
                artifactId = base.archivesName.get()
                from components.java
            }
        }

        repositories {

        }
    }
}

forgix {
    group = "io.homo.superresolution"
    mergedJarName = "superresolution-${rootProject.mod_version}-${rootProject.minecraft_version}.jar"
    outputDir = "build/"
}