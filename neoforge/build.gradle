import java.nio.file.Paths

plugins {
    id 'com.github.johnrengelman.shadow'
}

loom {
    neoForge {}

    runs {
        client {
            client()
            runDir("../run")
        }
        server {
            server()
            runDir("../run")
        }
    }

}

architectury {
    platformSetupLoomIde()
    neoForge()
}
configurations {
    common
    shadowCommon // Don't use shadow from the shadow plugin because we don't want IDEA to index this.
    compileClasspath.extendsFrom common
    runtimeClasspath.extendsFrom common
    developmentNeoForge.extendsFrom common
}

repositories {
    maven {
        url "https://cursemaven.com"
        content {
            includeGroup "curse.maven"
        }
    }
    maven {
        name = 'NeoForged'
        url = 'https://maven.neoforged.net/releases'
    }
    maven {
        name = "Modrinth"
        url = "https://api.modrinth.com/maven"
        content {
            includeGroup "maven.modrinth"
        }
    }
}

def addModrinthMod(id, ver) {
    dependencies { modImplementation("maven.modrinth:${id}:${ver}-neoforge,${rootProject.minecraft_version}") }
}

def addModLib(name) {
    def file = Paths.get(rootProject.projectDir.asWritable().absolutePath, "libs", name + ".jar")
    dependencies {
        modImplementation(files(file.toAbsolutePath().asWritable().toString()))
    }
}

def addNoModLib(name) {
    def file = Paths.get(rootProject.projectDir.asWritable().absolutePath, "libs", name + ".jar")
    dependencies {
        implementation(forgeRuntimeLibrary(files(file.toAbsolutePath().asWritable().toString())))
    }
}

dependencies {
    neoForge "net.neoforged:neoforge:${rootProject.neoforge_version}"
    common(project(path: ':common', configuration: 'namedElements')) { transitive false }
    shadowCommon(project(path: ":common", configuration: "transformProductionNeoForge")) { transitive false }
    if (rootProject.properties.get("neoforge_use_modrinth_mods") != null) {
        String modStr = rootProject.properties.get("neoforge_use_modrinth_mods")
        String[] mods = modStr.split(",")
        for (def modID : mods) {
            String modVer = rootProject.properties.get("neoforge_use_modrinth_mod_ver_" + modID)
            if (modVer != null) {
                addModrinthMod(
                        modID,
                        modVer
                )
            }
        }
    }
    if (rootProject.properties.get("neoforge_use_nomod_lib") != null) {
        String libStr = rootProject.properties.get("neoforge_use_nomod_lib")
        String[] libs = libStr.split(",")
        for (def lib : libs) {
            addNoModLib(lib)
        }
    }
    if (rootProject.properties.get("neoforge_use_mod_lib") != null) {
        String libStr = rootProject.properties.get("neoforge_use_mod_lib")
        String[] libs = libStr.split(",")
        for (def lib : libs) {
            addModLib(lib)
        }
    }
    modImplementation "dev.architectury:architectury-neoforge:$rootProject.architectury_api_version"
    modCompileOnly "dev.architectury:architectury:$rootProject.architectury_api_version"
    implementation("io.github.spair:imgui-java-app:1.87.5")
    implementation("io.github.spair:imgui-java-binding:1.87.5")
    implementation("io.github.spair:imgui-java-lwjgl3:1.87.5")
    forgeRuntimeLibrary "io.github.spair:imgui-java-app:1.87.5"
    forgeRuntimeLibrary "io.github.spair:imgui-java-binding:1.87.5"
    forgeRuntimeLibrary "io.github.spair:imgui-java-lwjgl3:1.87.5"
    implementation("org.lwjgl:lwjgl-vulkan:$rootProject.lwjgl_version")
    forgeRuntimeLibrary("org.lwjgl:lwjgl-vulkan:$rootProject.lwjgl_version")
    include("org.lwjgl:lwjgl-vulkan:$rootProject.lwjgl_version")
}

processResources {
    inputs.property 'version', project.version

    filesMatching('META-INF/neoforge.mods.toml') {
        expand(
                version: project.version,
                versionRange: rootProject.forgelike_mod_minecraft_version_range
        )
    }
}

shadowJar {
    configurations = [project.configurations.shadowCommon]
    archiveClassifier = "dev-shadow"
}

remapJar {
    input.set shadowJar.archiveFile
}
