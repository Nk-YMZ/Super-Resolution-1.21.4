name: Build

on:
  push:
    branches: [ '*' ]

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, 'SKIP') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake build-essential ninja-build

      - name: Prepare Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.4.321.1
          vulkan-components: Vulkan-Headers,Vulkan-Loader,SPIRV-Cross,SPIRV-Tools,Glslang
          vulkan-use-cache: true

      - name: Initialize
        working-directory: native/cpp
        run: python init.py

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Clang
        uses: egor-tensin/setup-clang@v1
        with:
          version: latest
      
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            caches
            notifications
            wrapper
          gradle-home-cache-excludes: |
            caches/build-cache-1

      - name: Build
        id: build
        if: ${{ !cancelled() }}
        run: ./gradlew buildAll
        continue-on-error: true
        
      - name: Capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: superresolution-build
          path: |
            build_jars/