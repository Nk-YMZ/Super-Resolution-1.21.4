name: Build Native Libraries

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
      - name: Prepare Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.4.321.1
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true
      - name: Build FFX SDK (Linux)
        run: |
          git clone https://github.com/187J3X1-114514/FidelityFX-SDK-UpscaleOnly ffx_sdk
          cd ffx_sdk
          bash build_linux.sh
          mkdir -p ../native/cpp/SRNativeFSR/libraries/linux64
          cp -a bin/ffx_sdk/. ../native/cpp/SRNativeFSR/libraries/linux64/
      - name: Upload FFX SDK artifacts (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: ffx-sdk-linux
          path: ffx_sdk/bin/ffx_sdk/**/*
      - name: Initialize
        working-directory: native/cpp
        run: python init.py
      - name: Build native libraries
        working-directory: native/cpp
        run: bash build_linux.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-libraries-linux
          path: native/cpp/output/**/*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Prepare Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.4.321.1
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true
      - name: Build FFX SDK (Windows)
        shell: powershell
        run: |
          git clone https://github.com/187J3X1-114514/FidelityFX-SDK-UpscaleOnly ffx_sdk
          Set-Location ffx_sdk
          powershell -ExecutionPolicy Bypass -File build_windows.ps1
          $dest = "${{ github.workspace }}\native\cpp\SRNativeFSR\libraries\win64"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "${{ github.workspace }}\ffx_sdk\bin\ffx_sdk\*" -Destination $dest -Recurse -Force
      - name: Upload FFX SDK artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: ffx-sdk-windows
          path: ffx_sdk/bin/ffx_sdk/**/*
      - name: Initialize
        working-directory: native/cpp
        run: python init.py
      - name: Build native libraries
        working-directory: native/cpp
        run: powershell -ExecutionPolicy Bypass -File build_windows.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-libraries-windows
          path: native/cpp/output/**/*

  upload-artifacts:
    needs: [ build-linux, build-windows ]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-libraries-linux
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-libraries-windows
          path: artifacts/windows

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-libraries-all
          path: artifacts/**/*