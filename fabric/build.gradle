import org.apache.tools.ant.filters.ReplaceTokens

import java.nio.file.Paths

plugins {
    id 'com.github.johnrengelman.shadow'
}
loom {
    runs {
        client {
            client()
            runDir("../run")
        }
        server {
            server()
            runDir("../run")
        }
    }
}

architectury {
    platformSetupLoomIde()
    fabric()
}

configurations {
    common {
        canBeResolved = true
        canBeConsumed = false
    }
    compileClasspath.extendsFrom common
    runtimeClasspath.extendsFrom common
    developmentFabric.extendsFrom common

    // Files in this configuration will be bundled into your mod using the Shadow plugin.
    // Don't use the `shadow` configuration from the plugin itself as it's meant for excluding files.
    shadowBundle {
        canBeResolved = true
        canBeConsumed = false
    }

}

repositories {
    maven {
        url "https://cursemaven.com"
        content {
            includeGroup "curse.maven"
        }
    }
    maven {
        name = "Terraformers"
        url = "https://maven.terraformersmc.com/"
    }
    maven {
        name = "Modrinth"
        url = "https://api.modrinth.com/maven"
        content {
            includeGroup "maven.modrinth"
        }
    }
}

def addModrinthMod(id, ver) {
    dependencies { modImplementation("maven.modrinth:${id}:${ver}-fabric,${rootProject.minecraft_version}") }
}

def addNoModLib(name) {
    def file = Paths.get(rootProject.projectDir.asWritable().absolutePath, "libs", name + ".jar")
    dependencies {
        implementation(files(file.toAbsolutePath().asWritable().toString()))
    }
}

def addModLib(name) {
    def file = Paths.get(rootProject.projectDir.asWritable().absolutePath, "libs", name + ".jar")
    dependencies {
        modImplementation(files(file.toAbsolutePath().asWritable().toString()))
    }
}


dependencies {
    modImplementation "net.fabricmc:fabric-loader:$rootProject.fabric_loader_version"
    modImplementation "net.fabricmc.fabric-api:fabric-api:$rootProject.fabric_api_version"
    modImplementation "dev.architectury:architectury-fabric:$rootProject.architectury_api_version"
    modImplementation("com.terraformersmc:modmenu:${project.modmenu_version}")
    if (rootProject.properties.get("fabric_use_modrinth_mods") != null) {
        String modStr = rootProject.properties.get("fabric_use_modrinth_mods")
        String[] mods = modStr.split(",")
        for (def modID : mods) {
            String modVer = rootProject.properties.get("fabric_use_modrinth_mod_ver_" + modID)
            if (modVer != null) {
                addModrinthMod(
                        modID,
                        modVer
                )
            }
        }
    }
    if (rootProject.properties.get("fabric_use_nomod_lib") != null) {
        String libStr = rootProject.properties.get("fabric_use_nomod_lib")
        String[] libs = libStr.split(",")
        for (def lib : libs) {
            addNoModLib(lib)
        }
    }
    if (rootProject.properties.get("fabric_use_mod_lib") != null) {
        String libStr = rootProject.properties.get("fabric_use_mod_lib")
        String[] libs = libStr.split(",")
        for (def lib : libs) {
            addModLib(lib)
        }
    }
    common(project(path: ':common', configuration: 'namedElements')) { transitive false }
    shadowBundle project(path: ':common', configuration: 'transformProductionFabric')
    implementation "io.github.spair:imgui-java-app:1.87.5"
    implementation "io.github.spair:imgui-java-binding:1.87.5"
    implementation "io.github.spair:imgui-java-lwjgl3:1.87.5"
    implementation "org.anarres:jcpp:1.4.14"
    implementation "org.antlr:antlr4-runtime:4.13.1"
    implementation "io.github.douira:glsl-transformer:2.0.1"

    implementation("org.lwjgl:lwjgl-vulkan:$rootProject.lwjgl_version")
    include("org.lwjgl:lwjgl-vulkan:$rootProject.lwjgl_version")
}

processResources {
    inputs.property 'version', project.version
    String[] srcVersionRange = (rootProject.fabriclike_mod_minecraft_version_range as String).split(",")

    StringBuilder stringBuilder = new StringBuilder()
    if (srcVersionRange.size() > 1) {
        stringBuilder.append("[")
        srcVersionRange.each {
            srcVersionRange[new ArrayList<String>(srcVersionRange as Collection<? extends String>).indexOf(it)] = '"%s"'.formatted(it)
        }
        stringBuilder.append(srcVersionRange.join(","))
        stringBuilder.append("]")
    } else {
        stringBuilder.append('"%s"'.formatted(srcVersionRange[0]))
    }

    String versionRange = stringBuilder.toString()

    filesMatching('fabric.mod.json') {
        expand(
                version: project.version,
                javaVersion: rootProject.java_version
        )
        //println(it.file.absolutePath)
        filter { String line ->
            return line.replace('"{versionRange}"', versionRange)
        }
    }
}

shadowJar {
    configurations = [project.configurations.shadowBundle]
    archiveClassifier = 'dev-shadow'
}

remapJar {
    input.set shadowJar.archiveFile
}
loom {
    accessWidenerPath = file('src/main/resources/super_resolution.accesswidener')
}