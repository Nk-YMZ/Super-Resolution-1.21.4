architectury {
    common(versionConfig.common.platforms)
}

dependencies {
    modImplementation "net.fabricmc:fabric-loader:$versionConfig.fabric.loaderVersion"
    modCompileOnly "dev.architectury:architectury:$versionConfig.common.architecturyApiVersion"
    modCompileOnly("me.shedaniel.cloth:cloth-config:$versionConfig.common.clothConfigVersion")
    implementation("io.github.spair:imgui-java-app:1.87.5")
    implementation("io.github.spair:imgui-java-binding:1.87.5")
    implementation("io.github.spair:imgui-java-lwjgl3:1.87.5")
    implementation "org.anarres:jcpp:1.4.14"
    if (enableVulkan) {
        implementation("org.lwjgl:lwjgl-vulkan:$versionConfig.common.lwjglVersion")
    }
    implementation('com.electronwill.night-config:toml:3.6.0')
    implementation('com.electronwill.night-config:core:3.6.0')
}

tasks.register("genJNIHeader", Exec) {
    workingDir(rootProject.projectDir)
    def outputDir = file("../native/cpp/include").absolutePath
    def sourceFile = file("src/main/java/io/homo/superresolution/core/SuperResolutionNative.java").absolutePath
    def sourceDirs = sourceSets.main.java.srcDirs.join(File.pathSeparator)
    def classpath = configurations.runtimeClasspath.asPath
    commandLine(
            "javac",
            "-h", outputDir,
            "-sourcepath", sourceDirs,
            "-classpath", classpath,
            "-encoding", "UTF-8",
            sourceFile
    )

    doLast {
        delete(fileTree(
                dir: file("src/main/java").absolutePath,
                includes: ["**/*.class"],
                excludes: ["**/*.java"]
        ))
    }
}