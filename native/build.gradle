plugins {
    id 'java'
}

group = 'io.homo.SuperResolution'
version = '0.0.1-alpha.1'

repositories {
    mavenCentral()
}

dependencies {
}

tasks.register('configureCMake', Exec) {
    workingDir file(projectDir.path + "/cpp")
    commandLine 'cmake', '-S', '.', '-B', 'build', '-G', 'MinGW Makefiles' //"-DSRLIB_VERSION='${version}'"

    doFirst {
        delete "${projectDir}/cpp/build"
        delete "${projectDir}/cpp/bin"
        mkdir "${projectDir}/cpp/build"
    }
}

tasks.register('buildCMake', Exec) {
    dependsOn configureCMake
    workingDir file(projectDir.path + "/cpp/build")
    commandLine 'cmake', '--build', '.'
}

tasks.register('buildNative') {
    dependsOn configureCMake
    dependsOn buildCMake
    finalizedBy copyNativeLib

    doLast {
        println "构建完成"
    }
}

tasks.register('copyNativeLib', Copy) {
    dependsOn buildCMake
    from("${projectDir}/cpp/bin") {
        include "libSuperResolution*"
        exclude "**/*.a"
    }
    into "${projectDir}/../common/src/main/resources/lib/"
}

tasks.register('printLibMd5') {
    dependsOn copyNativeLib
    doLast {
        def libDir = file("${projectDir}/../common/src/main/resources/lib/")
        if (!libDir.exists()) {
            println "目录不存在: ${libDir.path}"
            return
        }
        libDir.eachFile { file ->
            if (file.isFile() && file.name.startsWith("libSuperResolution")) {
                def md5 = calculateMD5(file)
                println "${file.name}: ${md5}"
            }
        }
    }
}

def calculateMD5(File file) {
    def md = java.security.MessageDigest.getInstance('MD5')
    file.withInputStream { is ->
        byte[] buffer = new byte[8192]
        int read
        while ((read = is.read(buffer)) != -1) {
            md.update(buffer, 0, read)
        }
    }
    return md.digest().encodeHex().toString()
}

copyNativeLib.finalizedBy printLibMd5